[hooks]
# Toggle individual hooks on/off.
# Set to "yes" to monitor, "no" to skip.
# Missing entries default to "yes" (monitor everything).
# Changes take effect immediately — no restart needed.

SessionStart = yes
UserPromptSubmit = yes
PreToolUse = yes
PostToolUse = yes
PostToolUseFailure = yes
PermissionRequest = yes
Notification = yes
SubagentStart = yes
SubagentStop = yes
Stop = yes
TeammateIdle = yes
TaskCompleted = yes
ConfigChange = no
PreCompact = yes
SessionEnd = yes

# [sink] section removed — monitor now subscribes to hooks-store's pub socket.
# Set HOOKS_STORE_PUB_SOCK env var to receive live events from hooks-store.
