services:
  meilisearch:
    image: getmeili/meilisearch:v1.36.0
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - /home/opos/.local/share/meilisearch:/meili_data
    environment:
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  hooks-store:
    build: ../hooks-store
    ports:
      - "127.0.0.1:9800:9800"
    volumes:
      - /tmp/hooks-store.sock:/tmp/hooks-store.sock
    environment:
      BIND_ADDR: "0.0.0.0"
      MEILI_URL: "http://meilisearch:7700"
      HOOKS_STORE_SOCK: "/tmp/hooks-store.sock"
    tty: true
    stdin_open: true
    depends_on:
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  monitor:
    build: ../hooks-monitor
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /tmp/hook-monitor.sock:/tmp/hook-monitor.sock
    environment:
      BIND_ADDR: "0.0.0.0"
      HOOK_MONITOR_SOCK: "/tmp/hook-monitor.sock"
    tty: true
    stdin_open: true
    profiles:
      - full
    restart: unless-stopped

